name: AI Quant Daily Summary (Job 2)

on:
  schedule:
    # JSTの06:30はUTCの21:30 (平日のみ)
    - cron: '30 21 * * 1-5'
  workflow_dispatch:

jobs:
  run-summary-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Execute Summary Bot
        env:
          ALPACA_API_KEY: ${{ github.ref == 'refs/heads/main' && secrets.ALPACA_LIVE_API_KEY || secrets.ALPACA_PAPER_API_KEY }}
          ALPACA_SECRET_KEY: ${{ github.ref == 'refs/heads/main' && secrets.ALPACA_LIVE_SECRET_KEY || secrets.ALPACA_PAPER_SECRET_KEY }}
          ALPACA_BASE_URL: ${{ github.ref == 'refs/heads/main' && 'https://api.alpaca.markets' || 'https://paper-api.alpaca.markets' }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python main_bot.py --summary
        
      - name: Commit and Push Updated Report
        run: |
          git config --global user.name "AI Quant Bot"
          git config --global user.email "bot@github.actions.local"
          git add daily_report.md trading_history.db || true
          git commit -m "chore: Update daily report and database (summary mode) [skip ci]" || true
          git push origin ${{ github.ref_name }} || true
